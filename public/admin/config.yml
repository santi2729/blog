backend:
  name: git-gateway
  branch: main

media_folder: "public/assets/images"
public_folder: "/assets/images"
publish_mode: editorial_workflow

collections:
  - name: "posts"
    label: "Posts"
    folder: "src/content/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    editor:
      preview: false
    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "post"
      - label: "Current"
        name: "current"
        widget: "hidden"
        default: "post"
      - label: "Class"
        name: "class"
        widget: "hidden"
        default: "post-template"
      - label: "Subclass"
        name: "subclass"
        widget: "string"
        required: false
        default: "post"
      - label: "Navigation"
        name: "navigation"
        widget: "hidden"
        default: true
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Description"
        name: "description"
        widget: "string"
        required: false
      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD HH:mm:ss"
      - label: "Author"
        name: "author"
        widget: "relation"
        collection: "authors"
        search_fields: ["name"]
        value_field: "username"
        display_fields: ["name"]
      - label: "Tags"
        name: "tags"
        widget: "list"
        field:
          label: "Tag"
          name: "tag"
          widget: "string"
      - label: "Cover"
        name: "cover"
        widget: "image"
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"

  - name: "authors"
    label: "Authors"
    folder: "src/content/authors"
    create: true
    slug: "{{username}}"
    extension: "json"
    format: "json"
    fields:
      - label: "Username"
        name: "username"
        widget: "string"
      - label: "Name"
        name: "name"
        widget: "string"
      - label: "Bio"
        name: "bio"
        widget: "string"
        required: false
      - label: "Picture"
        name: "picture"
        widget: "image"
        required: false
      - label: "Location"
        name: "location"
        widget: "string"
        required: false
      - label: "Website URL"
        name: "url"
        widget: "string"
        required: false
      - label: "Full URL"
        name: "url_full"
        widget: "string"
        required: false
      - label: "Facebook"
        name: "facebook"
        widget: "string"
        required: false
      - label: "Twitter / X"
        name: "twitter"
        widget: "string"
        required: false
      - label: "Cover Image"
        name: "cover"
        widget: "image"
        required: false

  - name: "tags"
    label: "Tags"
    folder: "src/content/tags"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - label: "Name"
        name: "name"
        widget: "string"
      - label: "Description"
        name: "description"
        widget: "string"
        required: false
      - label: "Cover Image"
        name: "cover"
        widget: "image"
        required: false
